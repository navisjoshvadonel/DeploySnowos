# SnowOS Motion Configuration
# Standard durations and easing for the "Frozen" UI system

[ANIMATIONS]
# Base duration for all UI transitions (ms)
base_duration=300
# Window open/close duration
window_duration=350
# Workspace slide duration
workspace_duration=400
# Focus transition duration
focus_duration=200

[EASING]
# Smooth cubic-bezier (soft deceleration)
# Equivalent to: cubic-bezier(0.2, 0.8, 0.2, 1)
curve=0.2,0.8,0.2,1.0

[WINDOW_MOTION]
# Scaling factor for open/close (0.96 -> 1.0)
open_scale_start=0.96
close_scale_end=0.96
# Enable fade during scale
fade_enabled=true

[WORKSPACE]
# Slide direction: horizontal
transition_type=slide
# Dimming factor for inactive workspaces (0.0 to 1.0)
inactive_dim_factor=0.4
# Frosted effect intensity (blur radius in px)
inactive_blur=8

[NYX_HOOKS]
# Paths for interaction logging (pre-Nyx integration)
focus_hook_path=/home/develop/snowos/logs/motion-focus.log
launch_hook_path=/home/develop/snowos/logs/motion-launch.log
workspace_hook_path=/home/develop/snowos/logs/motion-workspace.log
