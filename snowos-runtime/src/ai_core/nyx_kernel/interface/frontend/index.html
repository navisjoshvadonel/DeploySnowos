<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SnowOS | AI-Native Interface</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #050505; color: #e5e5e5; }
        .glass { background: rgba(15, 15, 15, 0.7); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .glass-hover:hover { background: rgba(25, 25, 25, 0.8); border: 1px solid rgba(255, 255, 255, 0.2); }
        .mono { font-family: 'JetBrains Mono', monospace; }
        .animate-pulse-slow { animation: pulse 3s cubic-bezier(0.4, 0, 0.6, 1) infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #333; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #444; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        // --- Icons ---
        const Icon = ({ name, className = "w-5 h-5" }) => {
            useEffect(() => { lucide.createIcons(); }, [name]);
            return <i data-lucide={name} className={className}></i>;
        };

        // --- Components ---

        const Card = ({ title, children, icon, value, subtext, color = "blue" }) => (
            <div className="glass p-5 rounded-2xl flex flex-col gap-3 transition-all glass-hover">
                <div className="flex justify-between items-start">
                    <div className={`p-2 rounded-lg bg-${color}-500/10 text-${color}-400`}>
                        <Icon name={icon} />
                    </div>
                    {value && <span className="text-2xl font-bold">{value}</span>}
                </div>
                <div>
                    <h3 className="text-sm font-medium text-gray-400 uppercase tracking-wider">{title}</h3>
                    {subtext && <p className="text-xs text-gray-500 mt-1">{subtext}</p>}
                </div>
                {children}
            </div>
        );

        const GoalItem = ({ goal, onSelect, active }) => (
            <div 
                onClick={() => onSelect(goal)}
                className={`p-4 rounded-xl cursor-pointer transition-all border-l-4 ${active ? 'bg-white/5 border-blue-500' : 'bg-transparent border-transparent hover:bg-white/5'}`}
            >
                <div className="flex justify-between items-center mb-1">
                    <span className="text-xs font-mono text-gray-500">{goal.span_id.slice(0, 8)}</span>
                    <span className={`text-[10px] px-2 py-0.5 rounded-full ${goal.status === 'SUCCESS' ? 'bg-green-500/10 text-green-400' : goal.status === 'FAILED' ? 'bg-red-500/10 text-red-400' : 'bg-blue-500/10 text-blue-400 animate-pulse'}`}>
                        {goal.status}
                    </span>
                </div>
                <h4 className="text-sm font-medium truncate">{goal.name}</h4>
                <div className="text-[10px] text-gray-500 mt-2">
                    {new Date(goal.start_time * 1000).toLocaleString()}
                </div>
            </div>
        );

        const StateNode = ({ state, active, onSelect }) => (
            <div 
                onClick={() => onSelect(state)}
                className={`relative flex items-center gap-4 p-3 rounded-xl cursor-pointer transition-all ${active ? 'bg-blue-500/10 border border-blue-500/30' : 'hover:bg-white/5 border border-transparent'}`}
            >
                <div className={`w-3 h-3 rounded-full ${active ? 'bg-blue-500 shadow-[0_0_10px_rgba(59,130,246,0.5)]' : 'bg-gray-700'}`}></div>
                <div>
                    <div className="text-xs font-mono text-blue-400">{state.state_id}</div>
                    <div className="text-[10px] text-gray-500">{new Date(state.timestamp * 1000).toLocaleTimeString()}</div>
                </div>
                {active && <div className="ml-auto"><Icon name="chevron-right" className="w-4 h-4 text-blue-400" /></div>}
            </div>
        );

        // --- Main App ---

        const Login = ({ onLogin }) => {
            const [username, setUsername] = useState('');
            const [password, setPassword] = useState('');
            const [error, setError] = useState('');
            const [loading, setLoading] = useState(false);

            const handleSubmit = async (e) => {
                e.preventDefault();
                setLoading(true);
                setError('');
                try {
                    const formData = new FormData();
                    formData.append('username', username);
                    formData.append('password', password);
                    
                    const res = await fetch('/api/auth/login', {
                        method: 'POST',
                        body: formData
                    });
                    
                    if (res.ok) {
                        const data = await res.json();
                        onLogin(data.access_token);
                    } else {
                        setError('Invalid credentials');
                    }
                } catch (e) {
                    setError('Connection error');
                } finally {
                    setLoading(false);
                }
            };

            return (
                <div className="min-h-screen flex items-center justify-center bg-[#050505] p-6">
                    <div className="w-full max-w-md glass p-10 rounded-3xl space-y-8 animate-in fade-in zoom-in duration-500">
                        <div className="text-center">
                            <div className="w-16 h-16 bg-blue-600 rounded-2xl flex items-center justify-center mx-auto mb-6 shadow-2xl shadow-blue-600/20">
                                <Icon name="snowflake" className="text-white w-10 h-10" />
                            </div>
                            <h1 className="text-3xl font-bold tracking-tight">SnowOS</h1>
                            <p className="text-gray-500 mt-2">Nyx Multi-User Identity Layer</p>
                        </div>

                        <form onSubmit={handleSubmit} className="space-y-6">
                            {error && <div className="p-4 bg-red-500/10 border border-red-500/20 text-red-400 text-sm rounded-xl text-center">{error}</div>}
                            <div className="space-y-4">
                                <div className="space-y-2">
                                    <label className="text-xs font-bold text-gray-500 uppercase ml-1">Username</label>
                                    <input 
                                        type="text" 
                                        value={username}
                                        onChange={e => setUsername(e.target.value)}
                                        className="w-full bg-white/5 border border-white/10 rounded-xl px-4 py-3 outline-none focus:border-blue-500/50 transition-all"
                                        placeholder="Enter username"
                                        required
                                    />
                                </div>
                                <div className="space-y-2">
                                    <label className="text-xs font-bold text-gray-500 uppercase ml-1">Password</label>
                                    <input 
                                        type="password" 
                                        value={password}
                                        onChange={e => setPassword(e.target.value)}
                                        className="w-full bg-white/5 border border-white/10 rounded-xl px-4 py-3 outline-none focus:border-blue-500/50 transition-all"
                                        placeholder="••••••••"
                                        required
                                    />
                                </div>
                            </div>
                            <button 
                                type="submit" 
                                disabled={loading}
                                className={`w-full py-4 rounded-xl font-bold text-white transition-all ${loading ? 'bg-gray-700' : 'bg-blue-600 hover:bg-blue-500 shadow-xl shadow-blue-600/20'}`}
                            >
                                {loading ? 'Authenticating...' : 'Sign In'}
                            </button>
                        </form>
                    </div>
                </div>
            );
        };

        const ArchitectureView = ({ graph, insights, proposals, simulation, onSimulate, onApply, userRole }) => (
            <div className="space-y-8 animate-in fade-in duration-500">
                <div className="grid grid-cols-1 md:grid-cols-3 gap-6">
                    <Card title="System Modules" value={Object.keys(graph?.nodes || {}).length} icon="box" color="blue" />
                    <Card title="Active Connections" value={graph?.edges?.length || 0} icon="git-branch" color="purple" />
                    <Card title="Design Findings" value={insights.length} icon="search" color={insights.length > 0 ? "yellow" : "green"} />
                </div>

                <div className="grid grid-cols-12 gap-8">
                    {/* Graph Visualization */}
                    <div className="col-span-8 glass p-8 rounded-2xl">
                        <h3 className="text-xl font-bold mb-8 flex items-center gap-3">
                            <Icon name="layers" className="text-blue-500" />
                            System Architecture Model
                        </h3>
                        <div className="grid grid-cols-2 gap-4">
                            {Object.entries(graph?.nodes || {}).map(([name, node]) => (
                                <div key={name} className="p-4 rounded-xl bg-white/5 border border-white/5 hover:border-blue-500/30 transition-all">
                                    <div className="flex justify-between items-center mb-3">
                                        <div className="text-sm font-bold text-blue-400">{name}</div>
                                        <span className="text-[10px] uppercase text-gray-500">{node.type}</span>
                                    </div>
                                    <div className="grid grid-cols-2 gap-2 text-[10px]">
                                        <div className="text-gray-500">Latency: <span className="text-gray-300 font-mono">{node.latency_contribution.toFixed(3)}s</span></div>
                                        <div className="text-gray-500">CPU: <span className="text-gray-300 font-mono">{node.cpu_usage.toFixed(1)}%</span></div>
                                        <div className="text-gray-500">Coupling: <span className="text-gray-300 font-mono">{node.coupling_level.toFixed(2)}</span></div>
                                        <div className="text-gray-500">Fail Rate: <span className="text-gray-300 font-mono">{node.failure_rate.toFixed(2)}</span></div>
                                    </div>
                                </div>
                            ))}
                        </div>
                    </div>

                    {/* Insights & Proposals */}
                    <div className="col-span-4 space-y-6">
                        <div className="glass p-6 rounded-2xl">
                            <h3 className="text-lg font-bold mb-4 flex items-center gap-2">
                                <Icon name="alert-circle" className="text-yellow-500" />
                                Findings
                            </h3>
                            <div className="space-y-3">
                                {insights.map(f => (
                                    <div key={f.id} className="p-3 rounded-lg bg-yellow-500/5 border border-yellow-500/10">
                                        <div className="flex justify-between items-start mb-1">
                                            <span className="text-[10px] font-bold text-yellow-500 uppercase">{f.component}</span>
                                            <span className="text-[10px] text-gray-600">Impact: {f.impact_score.toFixed(2)}</span>
                                        </div>
                                        <div className="text-xs font-medium">{f.finding}</div>
                                    </div>
                                ))}
                                {insights.length === 0 && <p className="text-center text-xs text-gray-600 py-10">System is optimized.</p>}
                            </div>
                        </div>

                        <div className="glass p-6 rounded-2xl">
                            <h3 className="text-lg font-bold mb-4 flex items-center gap-2">
                                <Icon name="zap" className="text-blue-500" />
                                Refactor Proposals
                            </h3>
                            <div className="space-y-4">
                                {proposals.map(p => (
                                    <div key={p.id} className="space-y-3 p-4 rounded-xl bg-blue-500/5 border border-blue-500/10">
                                        <div className="text-xs font-bold text-blue-400">{p.type}</div>
                                        <p className="text-[10px] text-gray-400">{p.description}</p>
                                        <div className="flex gap-2">
                                            <button 
                                                onClick={() => onSimulate(p.id)}
                                                className="flex-1 bg-white/5 hover:bg-white/10 text-[10px] font-bold py-1.5 rounded transition-all"
                                            >
                                                Simulate
                                            </button>
                                            {(userRole === 'admin' || userRole === 'developer') && (
                                                <button 
                                                    onClick={() => onApply(p.id)}
                                                    className="flex-1 bg-blue-600 hover:bg-blue-500 text-[10px] font-bold py-1.5 rounded transition-all"
                                                >
                                                    Apply
                                                </button>
                                            )}
                                        </div>
                                    </div>
                                ))}
                                {proposals.length === 0 && <p className="text-center text-xs text-gray-600 py-10">No pending proposals.</p>}
                            </div>
                        </div>
                    </div>
                </div>

                {/* Simulation Modal/Result */}
                {simulation && (
                    <div className="glass p-8 rounded-2xl border-l-8 border-blue-500 animate-in slide-in-from-bottom-5">
                        <div className="flex justify-between items-start mb-6">
                            <div>
                                <h3 className="text-xl font-bold">Simulation Results: Proposal {simulation.proposal_id}</h3>
                                <p className="text-sm text-gray-500 mt-1">Predicted impact on system architecture performance</p>
                            </div>
                            <div className={`px-4 py-2 rounded-xl text-sm font-bold ${simulation.is_safe ? 'bg-green-500/10 text-green-400' : 'bg-red-500/10 text-red-400'}`}>
                                {simulation.is_safe ? '✔ SAFE TO APPLY' : '✖ RISK DETECTED'}
                            </div>
                        </div>
                        <div className="grid grid-cols-4 gap-8">
                            {Object.entries(simulation.baseline).map(([metric, value]) => {
                                const pred = simulation.predicted[metric];
                                const diff = ((pred - value) / value * 100) || 0;
                                const isBetter = diff < 0; // Lower is usually better for latency, cpu, etc.
                                return (
                                    <div key={metric} className="space-y-2">
                                        <div className="text-[10px] font-bold text-gray-500 uppercase">{metric}</div>
                                        <div className="flex items-end gap-3">
                                            <div className="text-lg font-bold">{pred.toFixed(3)}</div>
                                            <div className={`text-[10px] mb-1 font-bold ${isBetter ? 'text-green-400' : 'text-red-400'}`}>
                                                {diff.toFixed(1)}%
                                            </div>
                                        </div>
                                        <div className="w-full h-1.5 bg-white/5 rounded-full overflow-hidden">
                                            <div 
                                                className={`h-full ${isBetter ? 'bg-green-500' : 'bg-red-500'}`} 
                                                style={{ width: `${Math.min(100, Math.max(0, 100 + diff))}%` }}
                                            ></div>
                                        </div>
                                    </div>
                                );
                            })}
                        </div>
                        <div className="mt-8 pt-6 border-t border-white/5 flex justify-between items-center">
                            <div className="text-xs text-gray-400">Improvement Score: <span className="text-blue-400 font-bold">{simulation.improvement_score.toFixed(2)}</span></div>
                            <button onClick={() => onSimulate(null)} className="text-xs text-gray-500 hover:text-white transition-all underline">Dismiss Results</button>
                        </div>
                    </div>
                )}
            </div>
        );

        const SwarmView = ({ nodes, onAdd, onTrust, onRemove, userRole }) => {
            const [newUrl, setNewUrl] = useState('');
            return (
                <div className="space-y-8 animate-in fade-in duration-500">
                    <div className="grid grid-cols-1 md:grid-cols-3 gap-6">
                        <Card title="Connected Nodes" value={nodes.length} icon="server" color="blue" />
                        <Card title="Trusted Swarm" value={nodes.filter(n => n.trust_status === 'trusted').length} icon="shield-check" color="green" />
                        <Card title="Unverified" value={nodes.filter(n => n.trust_status !== 'trusted').length} icon="alert-triangle" color="yellow" />
                    </div>

                    <div className="glass p-8 rounded-2xl">
                        <div className="flex justify-between items-center mb-8">
                            <h3 className="text-xl font-bold flex items-center gap-3">
                                <Icon name="share-2" className="text-blue-500" />
                                Distributed Identity & Trust Layer
                            </h3>
                            {(userRole === 'admin' || userRole === 'developer') && (
                                <div className="flex gap-2">
                                    <input 
                                        type="text" 
                                        placeholder="Remote Node URL" 
                                        value={newUrl}
                                        onChange={e => setNewUrl(e.target.value)}
                                        className="bg-white/5 border border-white/10 rounded-lg px-4 py-2 text-sm outline-none focus:border-blue-500/50"
                                    />
                                    <button 
                                        onClick={() => { onAdd(newUrl); setNewUrl(''); }}
                                        className="bg-blue-600 hover:bg-blue-500 px-4 py-2 rounded-lg text-sm font-bold shadow-lg shadow-blue-600/20"
                                    >
                                        Add Node
                                    </button>
                                </div>
                            )}
                        </div>

                        <div className="overflow-x-auto">
                            <table className="w-full text-left">
                                <thead className="bg-white/5 border-b border-white/5">
                                    <tr>
                                        <th className="px-6 py-4 text-xs font-bold text-gray-400 uppercase tracking-widest">Node ID</th>
                                        <th className="px-6 py-4 text-xs font-bold text-gray-400 uppercase tracking-widest">URL</th>
                                        <th className="px-6 py-4 text-xs font-bold text-gray-400 uppercase tracking-widest">Status</th>
                                        <th className="px-6 py-4 text-xs font-bold text-gray-400 uppercase tracking-widest">Last Seen</th>
                                        <th className="px-6 py-4 text-xs font-bold text-gray-400 uppercase tracking-widest text-right">Actions</th>
                                    </tr>
                                </thead>
                                <tbody className="divide-y divide-white/5">
                                    {nodes.map(node => (
                                        <tr key={node.node_id} className="hover:bg-white/5 transition-all">
                                            <td className="px-6 py-4">
                                                <div className="text-sm font-mono text-blue-400">{node.node_id.slice(0, 12)}...</div>
                                            </td>
                                            <td className="px-6 py-4 text-sm text-gray-300">{node.url}</td>
                                            <td className="px-6 py-4">
                                                <span className={`text-[10px] font-bold px-2 py-0.5 rounded-full ${node.trust_status === 'trusted' ? 'bg-green-500/10 text-green-400' : 'bg-yellow-500/10 text-yellow-400'}`}>
                                                    {node.trust_status.toUpperCase()}
                                                </span>
                                            </td>
                                            <td className="px-6 py-4 text-sm text-gray-500">
                                                {node.last_seen ? new Date(node.last_seen).toLocaleString() : 'Never'}
                                            </td>
                                            <td className="px-6 py-4 text-right">
                                                <div className="flex justify-end gap-2">
                                                    {userRole === 'admin' && (
                                                        <>
                                                            {node.trust_status !== 'trusted' ? (
                                                                <button onClick={() => onTrust(node.node_id, true)} className="p-2 hover:bg-green-500/20 text-green-400 rounded-lg transition-colors" title="Trust Node">
                                                                    <Icon name="shield-check" className="w-4 h-4" />
                                                                </button>
                                                            ) : (
                                                                <button onClick={() => onTrust(node.node_id, false)} className="p-2 hover:bg-yellow-500/20 text-yellow-400 rounded-lg transition-colors" title="Revoke Trust">
                                                                    <Icon name="shield-off" className="w-4 h-4" />
                                                                </button>
                                                            )}
                                                            <button onClick={() => onRemove(node.node_id)} className="p-2 hover:bg-red-500/20 text-red-400 rounded-lg transition-colors" title="Remove Node">
                                                                <Icon name="trash-2" className="w-4 h-4" />
                                                            </button>
                                                        </>
                                                    )}
                                                </div>
                                            </td>
                                        </tr>
                                    ))}
                                    {nodes.length === 0 && (
                                        <tr>
                                            <td colSpan="5" className="px-6 py-20 text-center text-gray-600">
                                                No distributed nodes registered in the swarm.
                                            </td>
                                        </tr>
                                    )}
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            );
        };

        const Dashboard = () => {
            const [token, setToken] = useState(localStorage.getItem('nyx_token'));
            const [user, setUser] = useState(null);
            const [view, setView] = useState('overview');
            const [goals, setGoals] = useState([]);
            const [selectedGoal, setSelectedGoal] = useState(null);
            const [trace, setTrace] = useState([]);
            const [metrics, setMetrics] = useState({});
            const [states, setStates] = useState([]);
            const [selectedState, setSelectedState] = useState(null);
            const [scheduler, setScheduler] = useState(null);
            const [audit, setAudit] = useState([]);
            const [insights, setInsights] = useState([]);
            const [nodes, setNodes] = useState([]);
            const [archGraph, setArchGraph] = useState(null);
            const [archInsights, setArchInsights] = useState([]);
            const [archProposals, setArchProposals] = useState([]);
            const [simulationResult, setSimulationResult] = useState(null);
            const [liveData, setLiveData] = useState({ active_goals: 0, queue_size: 0 });
            const [isControlActionPending, setIsControlActionPending] = useState(false);

            useEffect(() => {
                if (!token) return;

                fetchMe();
                fetchData();
                const interval = setInterval(fetchData, 5000);
                
                // WebSocket for live updates
                const ws = new WebSocket(`ws://${window.location.host}/ws/updates?token=${token}`);
                ws.onmessage = (event) => {
                    const data = JSON.parse(event.data);
                    setLiveData(data);
                };

                return () => {
                    clearInterval(interval);
                    ws.close();
                };
            }, [token]);

            const fetchMe = async () => {
                try {
                    const res = await fetch('/api/auth/me', {
                        headers: { 'Authorization': `Bearer ${token}` }
                    });
                    if (res.ok) {
                        const data = await res.json();
                        setUser(data);
                    } else {
                        handleLogout();
                    }
                } catch (e) { console.error(e); }
            };

            const fetchData = async () => {
                try {
                    const headers = { 'Authorization': `Bearer ${token}` };
                    const [g, m, s, sch, a, i, n, ag, ai, ap] = await Promise.all([
                        fetch('/api/goals', { headers }).then(res => res.json()),
                        fetch('/api/metrics', { headers }).then(res => res.json()),
                        fetch('/api/states', { headers }).then(res => res.json()),
                        fetch('/api/scheduler/status', { headers }).then(res => res.json()),
                        fetch('/api/security/audit', { headers }).then(res => res.json()),
                        fetch('/api/insights', { headers }).then(res => res.json()),
                        fetch('/api/nodes', { headers }).then(res => res.json()),
                        fetch('/api/architecture/graph', { headers }).then(res => res.json()),
                        fetch('/api/architecture/insights', { headers }).then(res => res.json()),
                        fetch('/api/architecture/proposals', { headers }).then(res => res.json())
                    ]);
                    setGoals(g);
                    setMetrics(m);
                    setStates(s);
                    setScheduler(sch);
                    setAudit(a);
                    setInsights(i);
                    setNodes(n);
                    setArchGraph(ag);
                    setArchInsights(ai);
                    setArchProposals(ap);
                } catch (e) { console.error("Fetch error", e); }
            };

            const loadTrace = async (goal) => {
                setSelectedGoal(goal);
                const data = await fetch(`/api/trace/${goal.trace_id}`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                }).then(res => res.json());
                setTrace(data);
                setView('goals');
            };

            const loadState = async (state) => {
                setSelectedState(state);
                const data = await fetch(`/api/state/${state.state_id}`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                }).then(res => res.json());
                setSelectedState(prev => ({ ...prev, ...data }));
                setView('states');
            };

            const handleReplay = async (plan_id) => {
                if (isControlActionPending) return;
                setIsControlActionPending(true);
                try {
                    const res = await fetch(`/api/control/replay/${plan_id}`, { 
                        method: 'POST',
                        headers: { 'Authorization': `Bearer ${token}` }
                    });
                    if (res.ok) alert("Replay started in background.");
                    else alert("Permission denied or error.");
                } catch (e) { alert("Replay failed."); }
                setIsControlActionPending(false);
            };

            const handleRollback = async (state_id) => {
                if (!confirm(`Are you sure you want to rollback to state ${state_id}?`)) return;
                setIsControlActionPending(true);
                try {
                    const res = await fetch(`/api/control/rollback/${state_id}`, { 
                        method: 'POST',
                        headers: { 'Authorization': `Bearer ${token}` }
                    });
                    if (res.ok) alert("Rollback started in background.");
                    else alert("Permission denied or error.");
                } catch (e) { alert("Rollback failed."); }
                setIsControlActionPending(false);
            };

            const handleAddNode = async (url) => {
                try {
                    const res = await fetch('/api/nodes/add', {
                        method: 'POST',
                        headers: { 
                            'Authorization': `Bearer ${token}`,
                            'Content-Type': 'application/json'
                        },
                        body: JSON.stringify({ url })
                    });
                    if (res.ok) {
                        alert("Node added successfully.");
                        fetchData();
                    } else {
                        const err = await res.json();
                        alert(`Failed to add node: ${err.detail}`);
                    }
                } catch (e) { alert("Connection error."); }
            };

            const handleTrustNode = async (nodeId, trust) => {
                try {
                    const res = await fetch(`/api/nodes/trust/${nodeId}`, {
                        method: 'POST',
                        headers: { 
                            'Authorization': `Bearer ${token}`,
                            'Content-Type': 'application/json'
                        },
                        body: JSON.stringify({ trust })
                    });
                    if (res.ok) fetchData();
                } catch (e) { console.error(e); }
            };

            const handleRemoveNode = async (nodeId) => {
                if (!confirm(`Are you sure you want to remove node ${nodeId}?`)) return;
                try {
                    const res = await fetch(`/api/nodes/${nodeId}`, {
                        method: 'DELETE',
                        headers: { 'Authorization': `Bearer ${token}` }
                    });
                    if (res.ok) fetchData();
                } catch (e) { console.error(e); }
            };

            const handleSimulate = async (proposalId) => {
                try {
                    const res = await fetch('/api/architecture/simulate', {
                        method: 'POST',
                        headers: { 
                            'Authorization': `Bearer ${token}`,
                            'Content-Type': 'application/json'
                        },
                        body: JSON.stringify({ proposal_id: proposalId })
                    });
                    const data = await res.json();
                    setSimulationResult(data);
                } catch (e) { alert("Simulation failed."); }
            };

            const handleApplyArchitecture = async (proposalId) => {
                if (!confirm(`Are you sure you want to apply architecture upgrade ${proposalId}?`)) return;
                try {
                    const res = await fetch('/api/architecture/apply', {
                        method: 'POST',
                        headers: { 
                            'Authorization': `Bearer ${token}`,
                            'Content-Type': 'application/json'
                        },
                        body: JSON.stringify({ proposal_id: proposalId })
                    });
                    const data = await res.json();
                    if (data.success) {
                        alert("Architecture upgraded successfully.");
                        fetchData();
                        setSimulationResult(null);
                    } else {
                        alert("Upgrade failed or rejected by safety monitor.");
                    }
                } catch (e) { alert("Apply failed."); }
            };

            const handleLogin = (newToken) => {
                localStorage.setItem('nyx_token', newToken);
                setToken(newToken);
            };

            const handleLogout = () => {
                localStorage.removeItem('nyx_token');
                setToken(null);
                setUser(null);
            };

            if (!token) return <Login onLogin={handleLogin} />;

            return (
                <div className="flex h-screen overflow-hidden">
                    {/* Sidebar */}
                    <aside className="w-64 glass border-r border-white/5 flex flex-col p-6">
                        <div className="flex items-center gap-3 mb-10 px-2">
                            <div className="w-8 h-8 bg-blue-600 rounded-lg flex items-center justify-center">
                                <Icon name="snowflake" className="text-white w-5 h-5" />
                            </div>
                            <h1 className="text-xl font-bold tracking-tight">SnowOS <span className="text-blue-500 italic">Nyx</span></h1>
                        </div>

                        <nav className="flex flex-col gap-2 flex-1">
                            {[
                                { id: 'overview', name: 'Overview', icon: 'layout-dashboard' },
                                { id: 'goals', name: 'Goal Explorer', icon: 'target' },
                                { id: 'states', name: 'State Timeline', icon: 'git-branch' },
                                { id: 'scheduler', name: 'Scheduler', icon: 'cpu' },
                                { id: 'swarm', name: 'Distributed Swarm', icon: 'share-2' },
                                { id: 'architecture', name: 'Self-Design', icon: 'layers' },
                                { id: 'security', name: 'Security Audit', icon: 'shield' }
                            ].map(item => (
                                <button 
                                    key={item.id}
                                    onClick={() => setView(item.id)}
                                    className={`flex items-center gap-3 px-4 py-3 rounded-xl transition-all ${view === item.id ? 'bg-blue-600 text-white shadow-lg shadow-blue-600/20' : 'text-gray-400 hover:bg-white/5 hover:text-white'}`}
                                >
                                    <Icon name={item.icon} className="w-5 h-5" />
                                    <span className="font-medium">{item.name}</span>
                                </button>
                            ))}
                        </nav>

                        <div className="mt-auto flex flex-col gap-4">
                            <div className="p-4 glass rounded-2xl">
                                <div className="flex items-center justify-between mb-4">
                                    <div className="flex items-center gap-2">
                                        <div className="w-8 h-8 bg-blue-500/20 text-blue-400 rounded-lg flex items-center justify-center font-bold text-xs uppercase">
                                            {user?.username?.[0] || '?'}
                                        </div>
                                        <div className="overflow-hidden">
                                            <div className="text-xs font-bold truncate">{user?.username}</div>
                                            <div className="text-[10px] text-gray-500 uppercase">{user?.role}</div>
                                        </div>
                                    </div>
                                    <button onClick={handleLogout} className="text-gray-500 hover:text-red-400 transition-colors">
                                        <Icon name="log-out" className="w-4 h-4" />
                                    </button>
                                </div>
                                <div className="flex items-center gap-2 text-[10px] text-gray-400">
                                    <div className="w-2 h-2 rounded-full bg-green-500 animate-pulse"></div>
                                    System Online
                                </div>
                            </div>
                            <div className="px-4 text-[10px] text-gray-600 mono uppercase tracking-widest text-center">Stage 39 Interface</div>
                        </div>
                    </aside>

                    {/* Main Content */}
                    <main className="flex-1 overflow-y-auto bg-[#080808] p-10">
                        
                        {/* Header */}
                        <header className="flex justify-between items-center mb-10">
                            <div>
                                <h2 className="text-3xl font-bold capitalize">{view.replace('-', ' ')}</h2>
                                <p className="text-gray-500 mt-1">Real-time intelligence dashboard for SnowOS</p>
                            </div>
                            <div className="flex gap-4">
                                <div className="glass px-4 py-2 rounded-xl flex items-center gap-3">
                                    <div className="text-right">
                                        <div className="text-[10px] text-gray-500 uppercase">Load Average</div>
                                        <div className="text-sm font-bold text-blue-400">0.42 / 0.38 / 0.40</div>
                                    </div>
                                    <Icon name="bar-chart-2" className="text-blue-500 w-5 h-5" />
                                </div>
                            </div>
                        </header>

                        {/* Views */}
                        {view === 'overview' && (
                            <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6">
                                <Card title="Active Goals" value={liveData.active_goals} icon="target" color="blue" subtext="Current autonomous tasks" />
                                <Card title="Queue Size" value={liveData.queue_size} icon="list" color="purple" subtext="Pending scheduler items" />
                                <Card title="Resource Usage" value="12%" icon="cpu" color="green" subtext="CPU: 8% | MEM: 16%" />
                                <Card title="Security Status" value="Healthy" icon="shield-check" color="emerald" subtext="0 violations in 24h" />
                                
                                <div className="lg:col-span-3 glass rounded-2xl p-6 min-h-[300px]">
                                    <h3 className="text-lg font-bold mb-6 flex items-center gap-2">
                                        <Icon name="activity" className="text-blue-500" />
                                        Recent Activity
                                    </h3>
                                    <div className="space-y-4">
                                        {goals.slice(0, 5).map(g => (
                                            <div key={g.span_id} className="flex items-center gap-4 p-4 rounded-xl bg-white/5 border border-white/5 hover:border-white/10 transition-all cursor-pointer" onClick={() => loadTrace(g)}>
                                                <div className={`w-2 h-2 rounded-full ${g.status === 'SUCCESS' ? 'bg-green-500' : 'bg-blue-500 animate-pulse'}`}></div>
                                                <div className="flex-1">
                                                    <div className="text-sm font-medium">{g.name}</div>
                                                    <div className="text-[10px] text-gray-500 mono">{g.span_id}</div>
                                                </div>
                                                <div className="text-xs text-gray-400">{new Date(g.start_time * 1000).toLocaleTimeString()}</div>
                                            </div>
                                        ))}
                                    </div>
                                </div>

                                <div className="glass rounded-2xl p-6">
                                    <h3 className="text-lg font-bold mb-6 flex items-center gap-2">
                                        <Icon name="zap" className="text-yellow-500" />
                                        Insights
                                    </h3>
                                    <div className="space-y-4">
                                        {insights.slice(0, 3).map(insight => (
                                            <div key={insight.id} className={`p-3 rounded-lg border ${insight.type === 'optimization' ? 'bg-blue-500/10 border-blue-500/20' : 'bg-yellow-500/10 border-yellow-500/20'}`}>
                                                <div className={`text-xs font-bold mb-1 ${insight.type === 'optimization' ? 'text-blue-400' : 'text-yellow-400'}`}>
                                                    {insight.type.toUpperCase()}
                                                </div>
                                                <p className="text-[10px] text-gray-400">{insight.message}</p>
                                            </div>
                                        ))}
                                        {insights.length === 0 && <p className="text-center text-xs text-gray-600 py-10">No insights yet.</p>}
                                    </div>
                                </div>
                            </div>
                        )}

                        {view === 'goals' && (
                            <div className="grid grid-cols-12 gap-8 h-[calc(100vh-250px)]">
                                <div className="col-span-4 glass rounded-2xl p-4 overflow-y-auto">
                                    <h3 className="text-sm font-bold text-gray-500 uppercase mb-4 px-4">Goal History</h3>
                                    <div className="space-y-1">
                                        {goals.map(g => (
                                            <GoalItem key={g.span_id} goal={g} active={selectedGoal?.span_id === g.span_id} onSelect={loadTrace} />
                                        ))}
                                    </div>
                                </div>
                                <div className="col-span-8 glass rounded-2xl p-8 overflow-y-auto">
                                    {selectedGoal ? (
                                        <div>
                                            <div className="flex justify-between items-start mb-8">
                                                <div>
                                                    <h3 className="text-2xl font-bold">{selectedGoal.name}</h3>
                                                    <p className="text-gray-500 mono text-sm mt-1">{selectedGoal.trace_id}</p>
                                                </div>
                                                {(user?.role === 'admin' || user?.role === 'developer') && (
                                                    <button 
                                                        onClick={() => handleReplay(selectedGoal.plan_id)}
                                                        className={`px-4 py-2 rounded-lg text-sm font-bold flex items-center gap-2 ${isControlActionPending ? 'bg-gray-600' : 'bg-blue-600 shadow-lg shadow-blue-600/20'}`}
                                                        disabled={isControlActionPending}
                                                    >
                                                        <Icon name="play" className="w-4 h-4" /> Replay Plan
                                                    </button>
                                                )}
                                            </div>
                                            
                                            <div className="space-y-6 relative before:absolute before:left-[15px] before:top-2 before:bottom-2 before:w-0.5 before:bg-white/5">
                                                {trace.map((s, idx) => (
                                                    <div key={s.span_id} className="relative pl-10">
                                                        <div className={`absolute left-0 top-1 w-8 h-8 rounded-full flex items-center justify-center z-10 ${s.status === 'SUCCESS' ? 'bg-green-500/20 text-green-400' : 'bg-blue-500/20 text-blue-400'}`}>
                                                            {s.type === 'plan' ? <Icon name="list" className="w-4 h-4" /> : <Icon name="terminal" className="w-4 h-4" />}
                                                        </div>
                                                        <div className="glass p-4 rounded-xl">
                                                            <div className="flex justify-between items-center mb-2">
                                                                <span className="text-xs font-bold uppercase tracking-widest text-gray-500">{s.type}</span>
                                                                <span className="text-[10px] mono text-gray-600">{s.span_id}</span>
                                                            </div>
                                                            <div className="text-sm font-medium">{s.name}</div>
                                                            {s.status === 'SUCCESS' && s.end_time && (
                                                                <div className="mt-3 pt-3 border-t border-white/5 text-[10px] text-gray-500 flex gap-4">
                                                                    <span>Duration: {(s.end_time - s.start_time).toFixed(2)}s</span>
                                                                    <span>Status: <span className="text-green-400">SUCCESS</span></span>
                                                                </div>
                                                            )}
                                                        </div>
                                                    </div>
                                                ))}
                                            </div>
                                        </div>
                                    ) : (
                                        <div className="flex flex-col items-center justify-center h-full text-gray-600">
                                            <Icon name="target" className="w-16 h-16 mb-4 opacity-20" />
                                            <p>Select a goal to visualize execution</p>
                                        </div>
                                    )}
                                </div>
                            </div>
                        )}

                        {view === 'states' && (
                            <div className="grid grid-cols-12 gap-8 h-[calc(100vh-250px)]">
                                <div className="col-span-3 glass rounded-2xl p-6 overflow-y-auto">
                                    <h3 className="text-sm font-bold text-gray-500 uppercase mb-6">State Timeline</h3>
                                    <div className="space-y-2 relative before:absolute before:left-[21px] before:top-4 before:bottom-4 before:w-0.5 before:bg-white/5">
                                        {states.map(s => (
                                            <StateNode key={s.state_id} state={s} active={selectedState?.state_id === s.state_id} onSelect={loadState} />
                                        ))}
                                    </div>
                                </div>
                                <div className="col-span-9 glass rounded-2xl p-8 overflow-y-auto">
                                    {selectedState ? (
                                        <div>
                                            <div className="flex justify-between items-start mb-8 pb-8 border-b border-white/5">
                                                <div>
                                                    <h3 className="text-2xl font-bold flex items-center gap-3">
                                                        <Icon name="box" className="text-blue-500" />
                                                        {selectedState.state_id}
                                                    </h3>
                                                    <p className="text-gray-500 text-sm mt-1">Snapshot captured at {new Date(selectedState.timestamp * 1000).toLocaleString()}</p>
                                                </div>
                                                <div className="flex gap-3">
                                                    <button className="px-4 py-2 glass glass-hover rounded-lg text-sm font-bold flex items-center gap-2">
                                                        <Icon name="copy" className="w-4 h-4" /> Clone State
                                                    </button>
                                                    {user?.role === 'admin' && (
                                                        <button 
                                                            onClick={() => handleRollback(selectedState.state_id)}
                                                            className={`px-4 py-2 rounded-lg text-sm font-bold flex items-center gap-2 shadow-lg ${isControlActionPending ? 'bg-gray-600' : 'bg-red-600 shadow-red-600/20'}`}
                                                            disabled={isControlActionPending}
                                                        >
                                                            <Icon name="rotate-ccw" className="w-4 h-4" /> Rollback System
                                                        </button>
                                                    )}
                                                </div>
                                            </div>

                                            <div className="grid grid-cols-2 gap-8">
                                                <div>
                                                    <h4 className="text-xs font-bold text-gray-500 uppercase mb-4 tracking-widest">Metadata</h4>
                                                    <div className="space-y-3">
                                                        {selectedState.metadata && Object.entries(selectedState.metadata).map(([k, v]) => (
                                                            v && typeof v !== 'object' && (
                                                                <div key={k} className="flex justify-between items-center p-3 rounded-lg bg-white/5">
                                                                    <span className="text-xs text-gray-400 capitalize">{k.replace('_', ' ')}</span>
                                                                    <span className="text-xs font-mono text-gray-200">{String(v)}</span>
                                                                </div>
                                                            )
                                                        ))}
                                                    </div>
                                                </div>
                                                <div>
                                                    <h4 className="text-xs font-bold text-gray-500 uppercase mb-4 tracking-widest">Tracked Files</h4>
                                                    <div className="space-y-1 max-h-[400px] overflow-y-auto pr-2">
                                                        {selectedState.files?.map(f => (
                                                            <div key={f.path} className="p-2 rounded hover:bg-white/5 flex items-center gap-3">
                                                                <Icon name="file" className="w-3 h-3 text-gray-500" />
                                                                <span className="text-[10px] truncate text-gray-400 flex-1">{f.path}</span>
                                                                <span className="text-[10px] font-mono text-gray-600">{f.hash.slice(0, 8)}</span>
                                                            </div>
                                                        ))}
                                                    </div>
                                                </div>
                                            </div>
                                        </div>
                                    ) : (
                                        <div className="flex flex-col items-center justify-center h-full text-gray-600">
                                            <Icon name="git-branch" className="w-16 h-16 mb-4 opacity-20" />
                                            <p>Select a state to view versioned details</p>
                                        </div>
                                    )}
                                </div>
                            </div>
                        )}

                        {view === 'scheduler' && (
                            <div className="space-y-8">
                                <div className="grid grid-cols-3 gap-8">
                                    <Card title="Active Workers" value={scheduler?.active_workers || 0} icon="cpu" color="blue" />
                                    <Card title="Pending Tasks" value={scheduler?.pending_tasks || 0} icon="clock" color="orange" />
                                    <Card title="Throughput" value="1.2 t/s" icon="zap" color="yellow" />
                                </div>

                                <div className="glass rounded-2xl overflow-hidden">
                                    <table className="w-full text-left">
                                        <thead className="bg-white/5 border-b border-white/5">
                                            <tr>
                                                <th className="px-6 py-4 text-xs font-bold text-gray-400 uppercase tracking-widest">Task ID</th>
                                                <th className="px-6 py-4 text-xs font-bold text-gray-400 uppercase tracking-widest">Priority</th>
                                                <th className="px-6 py-4 text-xs font-bold text-gray-400 uppercase tracking-widest">Status</th>
                                                <th className="px-6 py-4 text-xs font-bold text-gray-400 uppercase tracking-widest">Wait Time</th>
                                                <th className="px-6 py-4 text-xs font-bold text-gray-400 uppercase tracking-widest text-right">Action</th>
                                            </tr>
                                        </thead>
                                        <tbody className="divide-y divide-white/5">
                                            {scheduler?.recent_events?.map(e => (
                                                <tr key={e.id} className="hover:bg-white/5 transition-all">
                                                    <td className="px-6 py-4 text-sm font-mono text-blue-400">{e.task_id}</td>
                                                    <td className="px-6 py-4">
                                                        <span className={`text-[10px] font-bold px-2 py-0.5 rounded-full ${e.priority >= 10 ? 'bg-red-500/10 text-red-400' : 'bg-green-500/10 text-green-400'}`}>
                                                            {e.priority >= 10 ? 'CRITICAL' : 'NORMAL'}
                                                        </span>
                                                    </td>
                                                    <td className="px-6 py-4 text-sm">{e.status}</td>
                                                    <td className="px-6 py-4 text-sm text-gray-500">{e.wait_time?.toFixed(2) || '0.00'}s</td>
                                                    <td className="px-6 py-4 text-right">
                                                        <button className="text-gray-500 hover:text-white"><Icon name="more-horizontal" /></button>
                                                    </td>
                                                </tr>
                                            ))}
                                        </tbody>
                                    </table>
                                </div>
                            </div>
                        )}

                        {view === 'security' && (
                            <div className="space-y-8">
                                <div className="glass p-8 rounded-2xl flex items-center justify-between border-l-8 border-emerald-500">
                                    <div>
                                        <h3 className="text-xl font-bold">Security Shield Active</h3>
                                        <p className="text-gray-400 text-sm mt-1">Capability-Based Security Model is enforcing 14 runtime policies.</p>
                                    </div>
                                    <div className="flex items-center gap-6">
                                        <div className="text-center">
                                            <div className="text-2xl font-bold text-emerald-400">0</div>
                                            <div className="text-[10px] text-gray-500 uppercase font-bold">Violations</div>
                                        </div>
                                        <div className="h-10 w-px bg-white/10"></div>
                                        <div className="text-center">
                                            <div className="text-2xl font-bold text-blue-400">142</div>
                                            <div className="text-[10px] text-gray-500 uppercase font-bold">Checks / hr</div>
                                        </div>
                                    </div>
                                </div>

                                <div className="glass rounded-2xl p-6">
                                    <h3 className="text-lg font-bold mb-6 flex items-center gap-2">
                                        <Icon name="history" className="text-blue-500" />
                                        Audit Log
                                    </h3>
                                    <div className="space-y-2">
                                        {audit.map(item => (
                                            <div key={item.id} className="flex items-center gap-4 p-4 rounded-xl bg-white/5 border border-white/5">
                                                <div className={`p-2 rounded-lg ${item.granted ? 'bg-green-500/10 text-green-400' : 'bg-red-500/10 text-red-400'}`}>
                                                    <Icon name={item.granted ? "check-circle" : "shield-alert"} className="w-4 h-4" />
                                                </div>
                                                <div className="flex-1">
                                                    <div className="text-xs font-bold mono text-gray-500 uppercase">{item.task_id}</div>
                                                    <div className="text-sm">{item.command}</div>
                                                </div>
                                                <div className="text-[10px] text-gray-500 text-right">
                                                    <div>{item.required_capability}</div>
                                                    <div className="mt-1">{new Date(item.timestamp * 1000).toLocaleTimeString()}</div>
                                                </div>
                                            </div>
                                        ))}
                                        {audit.length === 0 && <div className="text-center py-10 text-gray-600">No audit logs found</div>}
                                    </div>
                                </div>
                            </div>
                        )}

                        {view === 'architecture' && (
                            <ArchitectureView 
                                graph={archGraph}
                                insights={archInsights}
                                proposals={archProposals}
                                simulation={simulationResult}
                                onSimulate={handleSimulate}
                                onApply={handleApplyArchitecture}
                                userRole={user?.role}
                            />
                        )}

                        {view === 'swarm' && (
                            <SwarmView 
                                nodes={nodes} 
                                onAdd={handleAddNode} 
                                onTrust={handleTrustNode} 
                                onRemove={handleRemoveNode}
                                userRole={user?.role}
                            />
                        )}

                    </main>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<Dashboard />);
    </script>
</body>
</html>
