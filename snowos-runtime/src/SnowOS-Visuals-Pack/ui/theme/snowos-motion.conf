[ANIMATIONS]
base_duration = 300
window_duration = 350
workspace_duration = 400
focus_duration = 200

[EASING]
curve = 0.2,0.8,0.2,1.0

[WINDOW_MOTION]
open_scale_start = 0.96
close_scale_end = 0.96
fade_enabled = true

[SPATIAL]
z_depth_offset = 20
bg_blur_radius = 12
float_intensity = 0.05

[ADAPTIVE]
cpu_low = 20
cpu_high = 70
dock_compact_scale = 0.8
dock_expanded_scale = 1.1
time_shifts_enabled = true

[PERSONALITY]
mode = calm

[WORKSPACE]
transition_type = slide
inactive_dim_factor = 0.4
inactive_blur = 8

[NYX_HOOKS]
focus_hook_path = /home/develop/snowos/logs/motion-focus.log
launch_hook_path = /home/develop/snowos/logs/motion-launch.log
workspace_hook_path = /home/develop/snowos/logs/motion-workspace.log

